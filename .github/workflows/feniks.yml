name: Feniks Markerovka Olish

on:
  workflow_dispatch:
    inputs:
      sana:
        description: 'Sana (DD.MM.YYYY)'
        required: true
        default: ''
      mashina:
        description: 'Mashina'
        required: true
        type: choice
        options:
          - ISUZU 890
          - LABO 390
          - LABO 741

jobs:
  olish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python o'rnatish
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kutubxonalar o'rnatish
        run: pip install playwright requests && playwright install chromium

      - name: Script ishlatish
        env:
          FENIKS_LOGIN: ${{ secrets.FENIKS_LOGIN }}
          FENIKS_PAROL: ${{ secrets.FENIKS_PAROL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SANA: ${{ github.event.inputs.sana }}
          MASHINA: ${{ github.event.inputs.mashina }}
        run: python feniks_script.py

      - name: ZIP yuklash
        uses: actions/upload-artifact@v4
        with:
          name: markerovka-kodlar
          path: output/*.zip
          retention-days: 7
